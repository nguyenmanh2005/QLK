version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: qlk-rabbitmq
    ports:
      - "5672:5672"   # Cổng giao tiếp mặc định cho các service
      - "15672:15672" # Cổng giao diện web quản lý của RabbitMQ
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data:
